name: winget-submit

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to submit (for example v0.2.2)"
        required: true
        type: string
      force:
        description: "Submit even if this is not the latest stable release"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: winget-submit
  cancel-in-progress: false

jobs:
  submit:
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Resolve release tag and version
        id: release
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
          } else {
            $tag = "${{ github.event.release.tag_name }}"
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Release tag is empty."
          }

          $version = $tag.TrimStart("v")
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Guard stale release submissions
        id: stale_guard
        shell: pwsh
        run: |
          $latestTag = gh api repos/${{ github.repository }}/releases/latest --jq .tag_name
          $currentTag = "${{ steps.release.outputs.tag }}"
          $force = "${{ inputs.force }}"
          if ("${{ github.event_name }}" -ne "workflow_dispatch") {
            $force = "false"
          }

          if ($force -eq "true") {
            Write-Host "[warn] force enabled; skipping latest-release guard"
            "should_submit=true" >> $env:GITHUB_OUTPUT
            exit 0
          }

          if ($latestTag -ne $currentTag) {
            Write-Host "[skip] $currentTag is not the latest stable release ($latestTag)."
            "should_submit=false" >> $env:GITHUB_OUTPUT
            exit 0
          }

          "should_submit=true" >> $env:GITHUB_OUTPUT

      - name: Install wingetcreate
        if: steps.stale_guard.outputs.should_submit == 'true'
        shell: pwsh
        run: |
          winget install --id Microsoft.WingetCreate --exact --accept-source-agreements --accept-package-agreements --silent

      - name: Submit winget manifest update PR
        if: steps.stale_guard.outputs.should_submit == 'true'
        shell: pwsh
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINGET_TOKEN)) {
            throw "Missing WINGET_TOKEN secret."
          }

          $wingetCreate = (Get-Command wingetcreate -ErrorAction SilentlyContinue).Source
          if (-not $wingetCreate) {
            throw "wingetcreate command not found after installation."
          }

          $tag = "${{ steps.release.outputs.tag }}"
          $version = "${{ steps.release.outputs.version }}"
          $installerUrl = "https://github.com/${{ github.repository }}/releases/download/$tag/partboot.exe"

          & $wingetCreate update Haxllo.PartBoot `
            --version $version `
            --urls $installerUrl `
            --submit `
            --token $env:WINGET_TOKEN
