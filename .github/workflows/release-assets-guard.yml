name: release-assets-guard

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to validate (for example v0.1.3)"
        required: true
        type: string

jobs:
  verify-release-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}
        run: |
          ./scripts/check-release-assets.ps1 -Tag $env:TAG_NAME -Repo "${{ github.repository }}"
